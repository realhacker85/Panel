<!DOCTYPE html>
<html>
<head>
<title>Bot Hosting Panel</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
margin:5px;
}

button:hover{
background:#1d4ed8;
}

input{
padding:10px;
border-radius:6px;
border:none;
margin:5px;
}

pre{
background:black;
color:#00ff9c;
padding:15px;
height:200px;
overflow:auto;
border-radius:8px;
}

</style>
</head>

<body>

<header>
BOT HOSTING PANEL
</header><h2>Upload Bot</h2>

<input type="file" id="botzip">

<button onclick="uploadbot()">Upload Bot</button>

<h2>Control Bot</h2>

<button onclick="startbot()">Start</button>

<button onclick="stopbot()">Stop</button>

<h2>Edit File</h2>

<input id="filename" placeholder="index.js">

<br><br>

<textarea id="code" style="width:80%;height:200px"></textarea>

<br>

<button onclick="savefile()">Save File</button>

<div class="container">

<div class="card">
<h3>Upload Bot</h3>

<input type="file" id="file">

<button onclick="upload()">
Upload Bot
</button>

</div>

<div class="card">
<h3>Bot Control</h3>

<button onclick="start()">
Start Bot
</button>

<button onclick="stop()">
Stop Bot
</button>

</div>

<div class="card">
<h3>Console</h3>

<pre id="console"></pre>

</div>

</div>

<script>

function start(){
fetch("/start",{method:"POST"})
}

function stop(){
fetch("/stop",{method:"POST"})
}

function upload(){

let file=document.getElementById("file").files[0]

let data=new FormData()

data.append("file",file)

fetch("/upload",{
method:"POST",
body:data
})

}

async function logs(){

let res=await fetch("/logs")

let data=await res.json()

document.getElementById("console").innerText=data.join("")

}

setInterval(logs,2000)

</script>

</body>
</html>
