
<!DOCTYPE html>
<html>
<head>
<title>Private Bot Hosting Panel</title>
<style>
body{font-family:Arial;background:#0f0f0f;color:white;text-align:center}
input,button{padding:10px;margin:5px}
.bot{background:#1e1e1e;margin:10px;padding:10px;border-radius:8px}
</style>
</head>
<body>

<h1>PRIVATE BOT HOSTING PANEL</h1>

<input id="botname" placeholder="Bot Name">
<button onclick="addbot()">Add Bot</button>

<h2>Your Bots</h2>
<div id="bots"></div>

<script>

async function loadBots(){
let res = await fetch("/bots")
let data = await res.json()

let html=""
data.forEach(b=>{
html += `<div class="bot">
<b>${b.name}</b>
<button onclick="deletebot('${b.name}')">Delete</button>
</div>`
})

document.getElementById("bots").innerHTML = html
}

async function addbot(){
let name = document.getElementById("botname").value

await fetch("/addbot",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name})
})

loadBots()
}

async function deletebot(name){
await fetch("/deletebot",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name})
})

loadBots()
}

loadBots()

</script>

</body>
</html>
